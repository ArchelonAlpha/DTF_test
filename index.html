<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Trading Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0D1B2A;
      --charcoal: #1C2B3A;
      --gold: #C9952A;
      --amber: #A0621A;
      --offwhite: #F0EDE6;
      --offwhite-muted: rgba(240, 237, 230, 0.55);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--navy);
      color: var(--offwhite);
      font-family: 'Source Serif 4', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle ambient background texture */
    body::before {
      content: '';
      position: absolute;
      top: -40%;
      left: -20%;
      width: 70%;
      height: 140%;
      background: radial-gradient(ellipse at center, rgba(201, 149, 42, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -30%;
      right: -10%;
      width: 60%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(28, 43, 58, 0.8) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 680px;
      width: 100%;
    }

    .eyebrow {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 32px;
    }

    /* Gold rule above the title */
    .rule {
      display: block;
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 32px;
      opacity: 0.7;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(42px, 8vw, 72px);
      line-height: 1.08;
      letter-spacing: 0.01em;
      color: var(--gold);
      margin-bottom: 16px;
    }

    h1 span {
      color: var(--gold);
    }

    .subtitle {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--offwhite-muted);
      margin-bottom: 36px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 0 auto 48px;
      max-width: 320px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(201, 149, 42, 0.3);
    }

    .divider-diamond {
      width: 5px;
      height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.7;
    }

    .tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: clamp(18px, 3.5vw, 26px);
      line-height: 1.5;
      color: var(--offwhite);
      margin-bottom: 16px;
      font-style: italic;
    }

    .tagline-secondary {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 300;
      color: var(--offwhite-muted);
      line-height: 1.7;
      margin-bottom: 56px;
    }

    .pillars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .pillar {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
    }

    .pillar-sep {
      width: 1px;
      height: 12px;
      background: rgba(201, 149, 42, 0.35);
    }

    .coming-soon-block {
      border: 1px solid rgba(201, 149, 42, 0.2);
      padding: 28px 40px;
      display: inline-block;
    }

    .coming-soon-label {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--offwhite-muted);
      margin-bottom: 8px;
    }

    .coming-soon-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(22px, 4vw, 32px);
      color: var(--offwhite);
      letter-spacing: 0.04em;
    }

    .footer {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: rgba(240, 237, 230, 0.25);
    }

    @media (max-width: 480px) {
      .coming-soon-block { padding: 20px 24px; }
      .pillars { gap: 10px; }
    }

    @media (prefers-reduced-motion: no-preference) {
      .container { animation: fadein 1.2s ease both; }
      @keyframes fadein {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <p class="eyebrow">Coming Soon</p>
    <span class="rule"></span>

    <h1>Daily Trading<br><span>Focus</span></h1>

    <div class="pillars">
      <span class="pillar">Focus</span>
      <span class="pillar-sep"></span>
      <span class="pillar">Discipline</span>
      <span class="pillar-sep"></span>
      <span class="pillar">Profit</span>
    </div>

    <div class="divider"><div class="divider-diamond"></div></div>

    <p class="eyebrow">Coming Soon</p>
    <p class="subtitle">This is the future home of Daily Trading Focus</p>

    <div class="divider"><div class="divider-diamond"></div></div>

    <div class="coming-soon-block">
      <p class="coming-soon-label">Launching soon at</p>
      <p class="coming-soon-text">dailytradingfocus.com</p>
    </div>
  </div>

  <p class="footer">© 2026 Daily Trading Focus &nbsp;·&nbsp; All rights reserved</p>

</body>
</html>
